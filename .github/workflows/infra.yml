name: Infrastructure provision

on:
  pull_request:
    paths: &paths
      - 'infra/**'
      - '.github/workflows/infra.yml'
  push:
    branches: [main]
    paths: *paths

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        environment: [dev, stg, prod]

    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.5.7

      - uses: ./.github/actions/setup-gcloud
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA }}

      - name: OpenTofu fmt
        working-directory: infra
        run: tofu fmt -check

      - name: OpenTofu init
        working-directory: infra
        run: |
          tofu init -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}" \
            -backend-config="project=${{ vars.GCP_PROJECT_ID }}" \
            -backend-config="prefix=infra/${{ matrix.environment }}.tfstate"

      - name: OpenTofu validate
        working-directory: infra
        run: tofu validate -no-color

      - name: OpenTofu plan
        working-directory: infra
        run: |
          tofu plan -input=false -var-file=environments/${{ matrix.environment }}.tfvars -out=plan-${{ matrix.environment }}.tfplan
          tofu show -no-color plan-${{ matrix.environment }}.tfplan

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: plan
    strategy:
      matrix:
        environment: [dev, stg, prod]
      max-parallel: 1

    environment: ${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.5.7

      - uses: ./.github/actions/setup-gcloud
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA }}

      - name: OpenTofu init
        working-directory: infra
        run: |
          tofu init -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}" \
            -backend-config="project=${{ vars.GCP_PROJECT_ID }}" \
            -backend-config="prefix=infra/${{ matrix.environment }}.tfstate"

      - name: OpenTofu apply
        working-directory: infra
        run: |
          tofu apply -input=false -auto-approve -var-file=environments/${{ matrix.environment }}.tfvars

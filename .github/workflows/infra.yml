name: infra

on:
  pull_request:
    branches: [main]
    paths: &paths
      - 'infra/**'
      - '.github/workflows/infra.yml'
  push:
    branches: [main]
    paths: *paths

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: infra

env:
  OPENTOFU_VERSION: 1.11.6

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_INFRA }}
      - run: tofu fmt -check -recursive
      - run: tofu init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -input=false
      - run: tofu validate

  plan:
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    strategy:
      matrix:
        environment: [dev, stg, prd]
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_INFRA }}
      - run: tofu init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -input=false -var-file=envs/${{ matrix.environment }}.tfvars
      - name: tofu plan
        run: |
          tofu plan \
            -var-file=envs/${{ matrix.environment }}.tfvars \
            -out=tfplan-${{ matrix.environment }} \
            -no-color 2>&1 | tee plan-output.txt
      - name: Post plan diff to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan-output.txt', 'utf8').slice(0, 65000);
            const body = `### OpenTofu Plan — \`${{ matrix.environment }}\`\n\`\`\`hcl\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
      - uses: actions/upload-artifact@v7
        with:
          name: tfplan-${{ matrix.environment }}
          path: infra/tfplan-${{ matrix.environment }}
          retention-days: 7

  apply:
    if: github.ref == 'refs/heads/main'
    needs: plan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        environment: [dev, stg, prd]
      max-parallel: 1
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_INFRA }}
      - run: tofu init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -input=false -var-file=envs/${{ matrix.environment }}.tfvars
      - uses: actions/download-artifact@v8
        with:
          name: tfplan-${{ matrix.environment }}
          path: infra/
      - run: tofu apply -auto-approve tfplan-${{ matrix.environment }}

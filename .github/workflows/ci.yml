name: CI

on:
  pull_request:
    branches: [main]
    paths: &paths
      - 'src/**'
      - 'package.json'
      - 'yarn.lock'
      - 'Dockerfile'
      - '.github/**'
  push:
    branches: [main]
    paths: *paths

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node
        with:
          node-version: '22'

      - run: yarn lint
      - run: yarn test

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    needs: validate
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write
      security-events: write

    env:
      IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}/geospatial-api

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gcloud
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v4

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_URI }}:${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_URI }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

  deploy-dev:
    needs: build
    uses: ./.github/workflows/cd.yml
    with:
      environment: dev
      digest: ${{ needs.build.outputs.digest }}
    secrets: inherit

  deploy-stg:
    needs: [build, deploy-dev]
    uses: ./.github/workflows/cd.yml
    with:
      environment: stg
      digest: ${{ needs.build.outputs.digest }}
    secrets: inherit

  deploy-prod:
    needs: [build, deploy-stg]
    uses: ./.github/workflows/cd.yml
    with:
      environment: prod
      digest: ${{ needs.build.outputs.digest }}
    secrets: inherit
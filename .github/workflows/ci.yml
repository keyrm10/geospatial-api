name: CI

on:
  pull_request:
    branches: [main]
    paths: &paths
      - 'services/api/**'
      - 'services/cache/**'
      - '.github/**'
  push:
    branches: [main]
    paths: *paths

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      api: ${{ steps.filter.outputs.api }}
      cache: ${{ steps.filter.outputs.cache }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'services/api/src/**'
              - 'services/api/package.json'
              - 'services/api/yarn.lock'
              - 'services/api/Dockerfile'
            cache:
              - 'services/cache/**'

  validate:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node
        with:
          node-version: '22'

      - run: yarn lint
      - run: yarn test

  build-api:
    needs: [changes, validate]
    if: github.event_name == 'push' && needs.changes.outputs.api == 'true'
    uses: ./.github/workflows/_build.yml
    with:
      service: api
      context: services/api
      image-name: api
    secrets: inherit

  build-cache:
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.cache == 'true'
    uses: ./.github/workflows/_build.yml
    with:
      service: cache
      context: services/cache
      image-name: cache
    secrets: inherit

  deploy-dev-api:
    needs: build-api
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: dev
      service: api
      digest: ${{ needs['build-api'].outputs['digest'] }}
    secrets: inherit

  deploy-stg-api:
    needs: [build-api, deploy-dev-api]
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: stg
      service: api
      digest: ${{ needs['build-api'].outputs['digest'] }}
    secrets: inherit

  deploy-prod-api:
    needs: [build-api, deploy-stg-api]
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      service: api
      digest: ${{ needs['build-api'].outputs['digest'] }}
    secrets: inherit

  deploy-dev-cache:
    needs: build-cache
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: dev
      service: cache
      digest: ${{ needs['build-cache'].outputs['digest'] }}
    secrets: inherit

  deploy-stg-cache:
    needs: [build-cache, deploy-dev-cache]
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: stg
      service: cache
      digest: ${{ needs['build-cache'].outputs['digest'] }}
    secrets: inherit

  deploy-prod-cache:
    needs: [build-cache, deploy-stg-cache]
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      service: cache
      digest: ${{ needs['build-cache'].outputs['digest'] }}
    secrets: inherit

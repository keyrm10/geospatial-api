name: CD

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      digest:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: [dev, stg, prod]
      digest:
        required: true
        type: string

concurrency:
  group: cd-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    permissions:
      contents: read
      id-token: write

    env:
      IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}/geospatial-api

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gcloud
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: api-${{ inputs.environment }}
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: ${{ env.IMAGE_URI }}@${{ inputs.digest }}
          labels: commit-sha=${{ github.sha }}

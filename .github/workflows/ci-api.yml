name: ci-api

on:
  pull_request:
    branches: [main]
    paths: &paths
      - 'services/api/**'
      - '.github/workflows/ci-api.yml'
  push:
    branches: [main]
    paths: *paths

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_NAME: api
  REGISTRY_PATH: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}/api
  OPENTOFU_VERSION: 1.11.6

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: services/${{ env.SERVICE_NAME }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: services/${{ env.SERVICE_NAME }}/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn test

  build:
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
      - name: Build, push and scan
        id: build
        uses: ./.github/actions/build-push
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ vars.GCP_REGION }}
          registry_path: ${{ env.REGISTRY_PATH }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_BUILD }}

  release:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    defaults:
      run:
        working-directory: services/${{ env.SERVICE_NAME }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: yarn install --frozen-lockfile
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-dev:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: dev
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_INFRA }}
      - run: tofu init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -input=false
        working-directory: infra
      - run: tofu apply -auto-approve -var-file=envs/dev.tfvars -var="api_image_ref=${{ env.REGISTRY_PATH }}@${{ needs.build.outputs.digest }}"
        working-directory: infra

  deploy-stg:
    needs: [build, deploy-dev]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: stg
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_INFRA }}
      - run: tofu init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -input=false
        working-directory: infra
      - run: tofu apply -auto-approve -var-file=envs/stg.tfvars -var="api_image_ref=${{ env.REGISTRY_PATH }}@${{ needs.build.outputs.digest }}"
        working-directory: infra

  deploy-prd:
    needs: [build, deploy-stg]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: prd
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_INFRA }}
      - run: tofu init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -input=false
        working-directory: infra
      - run: tofu apply -auto-approve -var-file=envs/prd.tfvars -var="api_image_ref=${{ env.REGISTRY_PATH }}@${{ needs.build.outputs.digest }}"
        working-directory: infra

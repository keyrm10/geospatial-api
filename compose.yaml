services:
  api:
    build:
      context: ./services/api
    env_file:
      - ./services/api/.env
    restart: unless-stopped
    volumes:
      - ./services/api/src:/usr/src/app/src
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"

  cache:
    build:
      context: ./services/cache
    depends_on:
      - api
    environment:
      UPSTREAM_URL: http://api:3000
    restart: unless-stopped
    ports:
      - "8080:80"
